version: 1
repositories:
- id: restic-r2-main
  provider: restic
  repository_env: RESTIC_REPOSITORY
  password_env: RESTIC_PASSWORD
  env:
  - AWS_ACCESS_KEY_ID
  - AWS_SECRET_ACCESS_KEY
  status: active
  retention:
    keep_daily: 7
    keep_weekly: 4
    keep_monthly: 6
  check_after_backup: true
  notes: Example Restic repository configuration. Values must be supplied through environment variables.
targets:
- id: caddy-restic
  service_id: caddy
  repository_id: restic-r2-main
  include_paths:
  - /etc/caddy
  exclude_paths: []
  tags:
  - production
  - before-deploy
  database_dumps: []
  schedule: before_deploy
  status: active
  notes: Captures Caddy configuration before route changes.
- id: rankfan-new-restic
  service_id: rankfan-new
  repository_id: restic-r2-main
  include_paths:
  - /home/ivmm/rankfan-new
  - /var/lib/opsctl/backup-dumps/rankfan-new
  exclude_paths:
  - /home/ivmm/rankfan-new/vendor
  - /home/ivmm/rankfan-new/node_modules
  tags:
  - production
  - before-deploy
  database_dumps:
  - id: rankfan-mysql-dump
    kind: mysql
    container: phprank-db
    database: configured-by-env
    output_path: /var/lib/opsctl/backup-dumps/rankfan-new/mysql.sql.zst
    notes: Dump command can be executed by controlled CLI backup and snapshot flows.
  schedule: before_deploy
  status: active
- id: pcafev2-restic
  service_id: pcafev2
  repository_id: restic-r2-main
  include_paths:
  - /home/ivmm/daohang/pcafev2
  - /var/lib/opsctl/backup-dumps/pcafev2
  exclude_paths:
  - /home/ivmm/daohang/pcafev2/node_modules
  - /home/ivmm/daohang/pcafev2/.next/cache
  tags:
  - production
  - before-deploy
  database_dumps:
  - id: pcafe-postgres-dump
    kind: postgres
    container: pcafe-db
    database: configured-by-env
    output_path: /var/lib/opsctl/backup-dumps/pcafev2/postgres.sql.zst
    notes: Dump command can be executed by controlled CLI backup and snapshot flows.
  schedule: before_deploy
  status: active
- id: mariadb-edu-rich-external
  service_id: mariadb-edu-rich
  repository_id: restic-r2-main
  include_paths:
  - /home/ivmm/seo-website/mariadb
  exclude_paths: []
  tags:
  - external
  database_dumps: []
  schedule: external
  status: external
  notes: External Cloudflare deployment; local source backup only.
