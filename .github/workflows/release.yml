name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev
          cargo install cross --locked
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked
      - name: Quality gate
        run: scripts/release-gate.sh
      - name: Build release artifacts
        run: |
          OPSCTL_RELEASE_BUILD_TOOL=cross \
          OPSCTL_RELEASE_TARGETS="x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu" \
          OPSCTL_RELEASE_SKIP_QUALITY=1 \
          scripts/release.sh
      - name: Upload artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: opsctl-release
          path: target/release-dist/**
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: target/release-dist/**/*
