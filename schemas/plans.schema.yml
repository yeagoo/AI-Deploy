$schema: https://json-schema.org/draft/2020-12/schema
$id: https://opsctl.local/schemas/plans.schema.yml
title: opsctl deploy plan
type: object
additionalProperties: false
required:
  - id
  - actor
  - project_root
  - intent
  - environment
  - changes
properties:
  id:
    type: string
    pattern: "^deploy_[a-z0-9][a-z0-9_-]*$"
  actor:
    type: string
  service_id:
    type: string
    pattern: "^[a-z0-9][a-z0-9_-]*$"
  project_root:
    type: string
  intent:
    type: string
    enum:
      - deploy
      - update
      - rollback
      - remove
      - migrate
      - inspect
  environment:
    type: string
    enum:
      - production
      - staging
      - development
      - external
      - unknown
  source:
    type: object
    additionalProperties: false
    required:
      - kind
      - commit
      - branch
      - origin_fingerprint
    properties:
      kind:
        const: git
      commit:
        type: string
        pattern: "^([A-Fa-f0-9]{40}|[A-Fa-f0-9]{64})$"
      branch:
        type: string
        minLength: 1
        maxLength: 255
      origin_fingerprint:
        type: string
        pattern: "^[a-f0-9]{64}$"
  managed_service:
    type: object
    additionalProperties: false
    required:
      - profile
      - kind
      - deploy_method
      - owner
      - deployment
    properties:
      profile:
        type: string
        enum:
          - docker_compose
          - static_site
          - node_systemd
          - laravel_systemd
      kind:
        type: string
        pattern: "^[A-Za-z0-9_-]{1,128}$"
      deploy_method:
        type: string
        pattern: "^[A-Za-z0-9_-]{1,128}$"
      owner:
        type: string
        pattern: "^[A-Za-z0-9_-]{1,128}$"
      env_files:
        type: array
        items:
          type: string
      environment:
        type: object
        additionalProperties: false
        required:
          - file
          - required_keys
        properties:
          file:
            type: string
          required_keys:
            type: array
            uniqueItems: true
            items:
              type: string
              pattern: "^[A-Za-z_][A-Za-z0-9_]{0,127}$"
      database:
        type: object
        additionalProperties: false
        required:
          - engine
          - evidence
          - backup_status
        properties:
          engine:
            enum: [postgres, mysql, mariadb, sqlite, unknown]
          evidence:
            type: array
            items:
              type: string
          backup_status:
            enum: [ready, required, not_required]
      deployment:
        type: object
  supply_chain:
    type: object
    additionalProperties: false
    required: [inputs, build_isolation]
    properties:
      inputs:
        type: array
        minItems: 1
        items:
          type: object
          additionalProperties: false
          required: [kind, path, sha256]
          properties:
            kind:
              enum: [dependency_lockfile, compose, dockerfile]
            path:
              type: string
            sha256:
              type: string
              pattern: "^[a-f0-9]{64}$"
      install:
        type: object
        additionalProperties: false
        required: [adapter, frozen, lifecycle_scripts]
        properties:
          adapter:
            enum: [npm, pnpm, bun]
          frozen:
            const: true
          lifecycle_scripts:
            const: false
      build_isolation:
        enum: [host_nonroot_clean_env, docker_compose_clean_env_reviewed]
  changes:
    type: object
    additionalProperties: true
    properties:
      ports:
        type: object
      caddy:
        type: object
        properties:
          routes:
            type: array
            items:
              type: object
              additionalProperties: false
              required: [host, upstream]
              properties:
                host:
                  type: string
                upstream:
                  type: string
                handler:
                  enum: [reverse_proxy, file_server]
                tls:
                  enum: [automatic, none]
      docker:
        type: object
        properties:
          build:
            type: boolean
          compose_file:
            type: string
          env_file:
            type: string
      static_site:
        type: object
        additionalProperties: false
        properties:
          sync:
            type: array
            items:
              type: object
              additionalProperties: false
              required:
                - source
                - destination
                - deployment_id
              properties:
                source:
                  type: string
                destination:
                  type: string
                deployment_id:
                  type: string
                  pattern: "^[A-Za-z0-9_-]{1,64}$"
      health:
        type: object
        additionalProperties: false
        properties:
          enabled:
            type: boolean
          docker:
            type: boolean
          ports:
            type: boolean
          caddy:
            type: boolean
          static_site:
            type: boolean
          controller:
            type: boolean
          stabilization_seconds:
            type: integer
            minimum: 0
            maximum: 30
          max_rollback_attempts:
            type: integer
            minimum: 0
            maximum: 1
      build:
        type: object
        additionalProperties: false
        properties:
          steps:
            type: array
            items:
              type: object
              additionalProperties: false
              required:
                - adapter
              properties:
                adapter:
                  type: string
                  enum:
                    - npm
                    - pnpm
                    - bun
                script:
                  type: string
                  pattern: "^[A-Za-z0-9:_-]{1,64}$"
      laravel:
        type: object
        additionalProperties: false
        properties:
          optimize:
            type: boolean
          config_cache:
            type: boolean
          route_cache:
            type: boolean
          view_cache:
            type: boolean
      systemd:
        type: object
        additionalProperties: false
        properties:
          units:
            type: array
            items:
              type: object
              additionalProperties: false
              required:
                - unit
                - action
              properties:
                unit:
                  type: string
                  pattern: "^[A-Za-z0-9_.@-]+\\.service$"
                action:
                  type: string
                  enum:
                    - reload
                    - restart
                    - enable
      files:
        type: object
        additionalProperties: false
        properties:
          write:
            type: array
            items:
              type: string
          typed:
            type: array
            items:
              type: object
              additionalProperties: false
              required:
                - path
                - kind
              properties:
                path:
                  type: string
                kind:
                  type: string
                  enum:
                    - caddy_route_snippet
                    - systemd_service
                params:
                  type: object
                  additionalProperties:
                    type: string
                mode:
                  type: integer
                  minimum: 384
                  maximum: 511
          delete:
            type: array
            items:
              type: string
      migrations:
        type: object
        additionalProperties: false
        properties:
          required:
            type: boolean
          command:
            type: string
          step:
            type: object
            additionalProperties: false
            required: [adapter, script]
            properties:
              adapter:
                enum: [npm, pnpm, bun]
              script:
                type: string
                pattern: "^[A-Za-z0-9:_-]{1,64}$"
      destructive_ops:
        type: array
        items:
          type: string
  preflight:
    type: object
    additionalProperties: false
    properties:
      status:
        type: string
        enum:
          - pending
          - passed
          - needs_approval
          - blocked
      checked_at:
        type: string
        format: date-time
      findings:
        type: array
        items:
          type: object
  approvals_required:
    type: array
    items:
      type: string
  snapshot_required:
    type: boolean
  notes:
    type: string
